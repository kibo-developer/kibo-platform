name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  deploy-api:
    if: contains(github.event.head_commit.message, '[deploy-api]') || contains(github.event.head_commit.message, '[deploy-all]')
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Deploy API
        run: |
          gcloud run deploy kibo-api-dev \
            --source ./apps/api \
            --region us-east1 \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=production,API_ENV=dev,SERVICE_NAME=kibo-api-dev \
            --project ${{ secrets.GCP_PROJECT_ID }}

  deploy-web:
    if: contains(github.event.head_commit.message, '[deploy-web]') || contains(github.event.head_commit.message, '[deploy-all]')
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Deploy Web
        run: |
          gcloud run deploy kibo-web-dev \
            --source ./apps/web \
            --region us-east1 \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=production,NEXT_PUBLIC_APP_ENV=dev,SERVICE_NAME=kibo-web-dev \
            --project ${{ secrets.GCP_PROJECT_ID }}

  deploy-all:
    if: contains(github.event.head_commit.message, '[deploy-all]')
    needs: [deploy-api, deploy-web]
    runs-on: ubuntu-latest
    steps:
      - name: Confirm full deployment
        run: echo "✅ Both API and Web have been successfully deployed."
