name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  validate-env:
    name: Validate Environment Variables
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      NODE_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install -g pnpm
          pnpm install

      - name: Run Validation Script
        run: |
          cd apps/api
          pnpm run validate-env

  deploy-api:
    name: Deploy API to Cloud Run
    needs: validate-env
    if: contains(github.event.head_commit.message, '[deploy-api]') || contains(github.event.head_commit.message, '[deploy-all]')
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      NODE_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Deploy API
        run: |
          gcloud run deploy kibo-api-dev \
            --source ./apps/api \
            --region us-east1 \
            --allow-unauthenticated \
            --project $GCP_PROJECT_ID

  deploy-web:
    name: Deploy Web App to Cloud Run
    needs: validate-env
    if: contains(github.event.head_commit.message, '[deploy-web]') || contains(github.event.head_commit.message, '[deploy-all]')
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://kibo-api-dev-362013941282.us-east1.run.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Deploy Web
        run: |
          gcloud run deploy kibo-web-dev \
            --source ./apps/web \
            --region us-east1 \
            --allow-unauthenticated \
            --project $GCP_PROJECT_ID

  deploy-all:
    name: Finalize Combined Deployments
    needs: [deploy-api, deploy-web]
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[deploy-all]')
    steps:
      - name: Summary
        run: echo "✅ Both API and Web have been successfully deployed to Cloud Run."
