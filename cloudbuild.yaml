steps:
  # 0. Validate Environment Checks
  - name: "bash"
    args:
      - "-c"
      - |
        echo "🔍 Validating environment variables..."
        if [ -z "$_NEXT_PUBLIC_API_URL" ]; then
          echo "❌ Missing _NEXT_PUBLIC_API_URL substitution"
          exit 1
        fi
        echo "✅ Environment variables valid."
    id: "Validate Env"

  # Build API Image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-f",
        "apps/api/Dockerfile",
        "-t",
        "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-api/api:latest",
        "--build-arg",
        "APP_ENV=${_APP_ENV}",
        ".",
      ]
    id: "Build API"
    waitFor: ["Validate Env"]

  # Build Web Image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-f",
        "apps/web/Dockerfile",
        "-t",
        "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-web/web:latest",
        "--build-arg",
        "APP_ENV=${_APP_ENV}",
        "--build-arg",
        "NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}",
        ".",
      ]
    id: "Build Web"
    waitFor: ["Validate Env"] # Run in parallel with API build

  # Push API Image
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-api/api:latest"]
    id: "Push API"
    waitFor: ["Build API"]

  # Push Web Image
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-web/web:latest"]
    id: "Push Web"
    waitFor: ["Build Web"]

  # Deploy API to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "kibo-api-dev"
      - "--image"
      - "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-api/api:latest"
      - "--region"
      - "us-east1"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "APP_ENV=${_APP_ENV}"
    id: "Deploy API"
    waitFor: ["Push API"]

  # Deploy Web to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "kibo-web-dev"
      - "--image"
      - "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-web/web:latest"
      - "--region"
      - "us-east1"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "APP_ENV=${_APP_ENV}"
    id: "Deploy Web"
    waitFor: ["Push Web"]

images:
  - "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-api/api:latest"
  - "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-web/web:latest"

timeout: "1200s"

substitutions:
  _APP_ENV: "dev"
  _NEXT_PUBLIC_API_URL: "" # Must be set in trigger

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
