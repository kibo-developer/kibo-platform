steps:
  # Build API Image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-f",
        "apps/api/Dockerfile",
        "-t",
        "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-api/api:latest",
        ".",
      ]
    id: "Build API"

  # Build Web Image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-f",
        "apps/web/Dockerfile",
        "-t",
        "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-web/web:latest",
        ".",
      ]
    id: "Build Web"
    waitFor: ["-"] # Run in parallel with API build

  # Push API Image
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-api/api:latest"]
    id: "Push API"
    waitFor: ["Build API"]

  # Push Web Image
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-web/web:latest"]
    id: "Push Web"
    waitFor: ["Build Web"]

  # Deploy API to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "kibo-api-dev"
      - "--image"
      - "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-api/api:latest"
      - "--region"
      - "us-east1"
      - "--allow-unauthenticated"
    id: "Deploy API"
    waitFor: ["Push API"]

  # Deploy Web to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "kibo-web-dev"
      - "--image"
      - "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-web/web:latest"
      - "--region"
      - "us-east1"
      - "--allow-unauthenticated"
    id: "Deploy Web"
    waitFor: ["Push Web"]

images:
  - "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-api/api:latest"
  - "us-east1-docker.pkg.dev/$PROJECT_ID/kibo-web/web:latest"

timeout: "1200s"

options:
  logging: CLOUD_LOGGING_ONLY
